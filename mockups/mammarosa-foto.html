<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Mammarosa — podgląd foto</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
      font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; }
  :root { --ink:#1D2A22; --lime:#D5E36B; --cream:#F5F1E8; --muted:#A79E8C; }
  html,body { background:#E9E4D8; }
  body { display:flex; justify-content:center; }
  .app { width:100%; max-width:430px; min-height:100vh; background:var(--cream); color:var(--ink);
         position:relative; padding:0 20px 130px; }

  .top { display:flex; align-items:center; justify-content:space-between; padding-top:24px; }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand img { width:32px; height:32px; object-fit:contain; opacity:.9; }
  .brand span { font-size:13px; font-weight:600; letter-spacing:.18em; }
  .tr { display:flex; align-items:center; gap:8px; }
  .demo { border:1px solid #E2D9C8; color:var(--muted); font-size:10px; font-weight:700;
          letter-spacing:.08em; padding:4px 10px; border-radius:999px; }
  .cartbtn { position:relative; width:44px; height:44px; border-radius:50%; background:var(--ink);
             border:none; display:flex; align-items:center; justify-content:center; }
  .cartbtn svg { width:20px; height:20px; }
  .badge { position:absolute; top:-4px; right:-4px; min-width:20px; height:20px; padding:0 5px;
           border-radius:999px; background:var(--lime); color:var(--ink); font-size:11px; font-weight:800;
           display:none; align-items:center; justify-content:center; }
  .badge.show { display:flex; }
  @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.45)} 100%{transform:scale(1)} }
  .badge.pop { animation:pop .45s ease; }

  h1 { padding-top:28px; font-size:30px; font-weight:700; line-height:1.12; letter-spacing:-.02em; }

  .search { margin-top:20px; display:flex; align-items:center; gap:12px; background:#fff;
            border-radius:16px; padding:14px 16px; box-shadow:0 2px 12px rgba(29,42,34,.05); }
  .search svg { width:20px; height:20px; color:var(--muted); flex:none; }
  .search input { border:none; outline:none; background:none; font-size:15px; width:100%; color:var(--ink); }
  .search input::placeholder { color:#B9B09D; }

  .cats { margin-top:20px; display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .cat { display:flex; flex-direction:column; align-items:center; gap:6px; background:#fff; border:none;
         border-radius:16px; padding:12px 4px; color:#6E6759; font-size:11px; font-weight:600; cursor:pointer; }
  .cat svg { width:20px; height:20px; }
  .cat.on { background:var(--ink); color:var(--cream); }

  .sec { display:flex; align-items:baseline; justify-content:space-between; padding:28px 0 12px; }
  .sec h2 { font-size:17px; font-weight:700; letter-spacing:-.01em; }
  .sec span { font-size:12px; color:var(--muted); }

  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .card { background:#fff; border-radius:24px; overflow:hidden; cursor:pointer;
          box-shadow:0 2px 14px rgba(29,42,34,.06); transition:box-shadow .2s; position:relative; }
  .card:hover { box-shadow:0 10px 28px rgba(29,42,34,.12); }
  .ph { aspect-ratio:1; background:radial-gradient(130% 130% at 30% 15%, #FDFBF5 0%, #EFE7D4 70%, #E7DCC4 100%); }
  .ph svg { width:100%; height:100%; display:block; }
  .incart { position:absolute; top:10px; right:10px; background:var(--lime); color:var(--ink);
            font-size:11px; font-weight:800; padding:4px 10px; border-radius:999px; display:none;
            box-shadow:0 2px 8px rgba(29,42,34,.25); }
  .incart.show { display:block; }
  .body { padding:10px 14px 14px; }
  .nm { font-size:15px; font-weight:700; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ds { margin-top:2px; font-size:11.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-height:15px; }
  .row { margin-top:10px; display:flex; align-items:center; justify-content:space-between; }
  .pr { font-size:15px; font-weight:800; }
  .view { font-size:12px; font-weight:700; color:#6E6759; background:var(--cream); border-radius:999px; padding:8px 14px; }

  .navwrap { position:fixed; left:0; right:0; bottom:20px; display:flex; justify-content:center;
             padding:0 20px; pointer-events:none; z-index:40; }
  .nav { pointer-events:auto; background:var(--ink); color:var(--cream); border-radius:999px;
         box-shadow:0 16px 36px rgba(29,42,34,.35); display:flex; align-items:center; }
  .nav.idle { gap:24px; padding:14px 28px; }
  .nav.idle .dot { width:8px; height:8px; border-radius:50%; background:var(--lime); display:inline-block; margin-right:8px; }
  .nav.idle .mut { color:rgba(255,255,255,.5); display:flex; align-items:center; gap:8px; }
  .nav.idle .mut svg { width:18px; height:18px; }
  .nav.full { width:100%; max-width:390px; justify-content:space-between; padding:10px 10px 10px 22px; cursor:pointer; }
  .nav.full .cnt { width:28px; height:28px; border-radius:50%; background:var(--lime); color:var(--ink);
                   font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; }
  .nav.full .sum { display:flex; align-items:center; gap:12px; font-size:15px; font-weight:700; }
  .nav.full .go { background:rgba(255,255,255,.1); color:var(--cream); font-size:14px;
                  font-weight:700; padding:10px 20px; border-radius:999px; display:flex; align-items:center; gap:8px; }
  .nav.full .go svg { width:16px; height:16px; }
  @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.03)} 100%{transform:scale(1)} }
  .nav.pulse { animation:pulse .4s ease; }
  .hide { display:none !important; }
  .empty { text-align:center; color:var(--muted); font-size:14px; padding:40px 0; }

  /* Toast */
  .toast { position:fixed; top:18px; left:50%; transform:translate(-50%,-80px); z-index:70;
           background:var(--ink); color:var(--cream); border-radius:999px; padding:12px 20px 12px 12px;
           display:flex; align-items:center; gap:10px; font-size:14px; font-weight:600;
           box-shadow:0 16px 36px rgba(29,42,34,.4); transition:transform .35s cubic-bezier(.2,.9,.3,1.2); }
  .toast.show { transform:translate(-50%,0); }
  .toast .tick { width:26px; height:26px; border-radius:50%; background:var(--lime); color:var(--ink);
                 display:flex; align-items:center; justify-content:center; font-weight:900; font-size:14px; }

  /* Product sheet */
  .overlay { position:fixed; inset:0; z-index:50; background:rgba(29,42,34,.45); display:none;
             align-items:flex-end; justify-content:center; backdrop-filter:blur(2px); }
  .overlay.show { display:flex; }
  .sheet { width:100%; max-width:430px; background:var(--cream); border-radius:28px 28px 0 0;
           max-height:88vh; overflow:auto; }
  .sheet .hero { position:relative; background:radial-gradient(130% 130% at 30% 10%, #FDFBF5 0%, #EFE7D4 75%, #E7DCC4 100%); padding:14px 40px 0; }
  .sheet .hero svg { width:100%; max-width:280px; display:block; margin:0 auto; }
  .close { position:absolute; top:14px; right:14px; width:40px; height:40px; border-radius:50%;
           background:#fff; border:none; box-shadow:0 1px 4px rgba(0,0,0,.08); font-size:16px; color:var(--ink); cursor:pointer; }
  .sbody { padding:18px 22px 26px; }
  .sbody h2 { font-size:22px; font-weight:700; letter-spacing:-.02em; }
  .sbody .sd { margin-top:4px; font-size:13px; color:var(--muted); line-height:1.5; }
  .lbl { margin:18px 0 10px; font-size:11px; font-weight:800; letter-spacing:.14em; color:var(--muted); }
  .addon { display:flex; align-items:center; gap:12px; background:#fff; border-radius:16px;
           padding:12px 14px; margin-top:8px; cursor:pointer; border:2px solid transparent; }
  .addon.on { border-color:var(--ink); }
  .tickbox { width:20px; height:20px; border-radius:50%; border:2px solid #D8CFBC; flex:none;
             display:flex; align-items:center; justify-content:center; }
  .addon.on .tickbox { background:var(--ink); border-color:var(--ink); color:var(--lime); font-size:11px; font-weight:900; }
  .addon .an { flex:1; font-size:14px; font-weight:600; }
  .addon .ap { font-size:13px; font-weight:700; color:var(--muted); }
  .qtyrow { margin-top:18px; display:flex; align-items:center; justify-content:space-between; }
  .stepper { display:flex; align-items:center; gap:4px; background:#fff; border-radius:999px; padding:4px; }
  .stepper button { width:38px; height:38px; border-radius:50%; border:none; background:none;
                    font-size:18px; font-weight:800; color:var(--ink); cursor:pointer; }
  .stepper button:active { background:var(--cream); }
  .stepper b { width:34px; text-align:center; font-size:16px; }
  .cta { margin-top:18px; width:100%; background:var(--ink); color:var(--cream); border:none;
         border-radius:999px; padding:17px 24px; font-size:15px; font-weight:700;
         display:flex; justify-content:space-between; cursor:pointer; }
  .cta b { color:var(--lime); }

  /* Cart sheet */
  .line { display:flex; align-items:center; justify-content:space-between; gap:10px; background:#fff;
          border-radius:16px; padding:12px 14px; margin-top:10px; }
  .line .nm2 { font-weight:700; font-size:14px; }
  .line .pr2 { font-size:12px; color:var(--muted); }
  .qty { display:flex; align-items:center; gap:8px; }
  .qb { width:32px; height:32px; border-radius:50%; border:none; background:var(--cream); font-weight:800; font-size:16px; color:var(--ink); cursor:pointer; }
  .tot { display:flex; justify-content:space-between; font-size:18px; font-weight:800; padding:18px 4px 0; }
  .note { text-align:center; font-size:11px; color:#B9B09D; padding:20px 10px 0; }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="brand"><img id="logo" alt=""><span>MAMMAROSA</span></div>
    <div class="tr">
      <span class="demo">PODGLĄD</span>
      <button class="cartbtn" onclick="openCart()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#F5F1E8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 4h2l2.4 12.2a1.6 1.6 0 0 0 1.6 1.3h8.6a1.6 1.6 0 0 0 1.6-1.3L21 8H6"/>
          <circle cx="10" cy="21" r="1.4" fill="#F5F1E8"/><circle cx="17.5" cy="21" r="1.4" fill="#F5F1E8"/>
        </svg>
        <span class="badge" id="badge">0</span>
      </button>
    </div>
  </div>

  <h1>Na co masz dziś<br>ochotę?</h1>

  <label class="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <circle cx="11" cy="11" r="6.5"/><path d="M16 16 L21 21"/>
    </svg>
    <input id="q" placeholder="Szukaj w menu…" oninput="render()">
  </label>

  <div class="cats" id="cats"></div>

  <div class="sec"><h2 id="secTitle">Popularne teraz</h2><span id="secCount"></span></div>
  <div class="grid" id="grid"></div>
  <div class="empty hide" id="empty">Nic nie znaleziono — spróbuj inaczej.</div>
  <div class="note">Grafiki generowane — w finalnej wersji identycznie wyglądają prawdziwe zdjęcia potraw.</div>
</div>

<div class="toast" id="toast"><span class="tick">✓</span><span id="toastMsg"></span></div>

<div class="navwrap">
  <div class="nav idle" id="navIdle">
    <span style="font-size:14px;font-weight:600;display:flex;align-items:center"><span class="dot"></span>Menu</span>
    <span class="mut">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h2l2.4 12.2a1.6 1.6 0 0 0 1.6 1.3h8.6a1.6 1.6 0 0 0 1.6-1.3L21 8H6"/></svg>
      Koszyk pusty
    </span>
  </div>
  <div class="nav full hide" id="navFull" onclick="openCart()">
    <span class="sum"><span class="cnt" id="navCnt">0</span><span id="navSum">0,00 zł</span></span>
    <span class="go">Do koszyka
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12 H20 M14 6 L20 12 L14 18"/></svg>
    </span>
  </div>
</div>

<!-- Karta produktu -->
<div class="overlay" id="prodOverlay" onclick="if(event.target===this)closeProd()">
  <div class="sheet">
    <div class="hero"><div id="prodArt"></div><button class="close" onclick="closeProd()">✕</button></div>
    <div class="sbody">
      <h2 id="prodName"></h2>
      <p class="sd" id="prodDesc"></p>
      <div id="prodAddons"></div>
      <div class="qtyrow">
        <span class="lbl" style="margin:0">ILOŚĆ</span>
        <div class="stepper">
          <button onclick="chSheetQty(-1)">−</button><b id="sheetQty">1</b><button onclick="chSheetQty(1)">+</button>
        </div>
      </div>
      <button class="cta" onclick="confirmAdd()"><span>Dodaj do koszyka</span><b id="sheetTotal"></b></button>
    </div>
  </div>
</div>

<!-- Koszyk -->
<div class="overlay" id="cartOverlay" onclick="if(event.target===this)closeCart()">
  <div class="sheet">
    <div class="sbody" style="padding-top:22px">
      <button class="close" style="position:static;float:right" onclick="closeCart()">✕</button>
      <h2>Twoje zamówienie</h2>
      <div id="cartLines"></div>
      <div class="tot"><span>Razem</span><span id="cartTotal">0,00 zł</span></div>
      <button class="cta" onclick="alert('To podgląd — w pełnej wersji zamówienie trafia do systemu na sali.')">
        <span>Zamawiam</span><b id="orderTotal">0,00 zł</b>
      </button>
    </div>
  </div>
</div>

<script>
/* ================= FOTOREALISTYCZNE GRAFIKI (SVG: gradienty + tekstury) ================= */

var DEFS = ''
 +'<defs>'
 +'<radialGradient id="plate" cx="42%" cy="36%" r="75%"><stop offset="0%" stop-color="#3B322B"/><stop offset="55%" stop-color="#262019"/><stop offset="100%" stop-color="#141009"/></radialGradient>'
 +'<radialGradient id="crustG" cx="45%" cy="40%" r="65%"><stop offset="0%" stop-color="#EFC27E"/><stop offset="70%" stop-color="#D9A459"/><stop offset="100%" stop-color="#B87F35"/></radialGradient>'
 +'<radialGradient id="cheeseG" cx="45%" cy="40%" r="70%"><stop offset="0%" stop-color="#FAE3A8"/><stop offset="65%" stop-color="#F2CF83"/><stop offset="100%" stop-color="#E2B461"/></radialGradient>'
 +'<radialGradient id="sauceG" cx="50%" cy="45%" r="60%"><stop offset="0%" stop-color="#C24A33"/><stop offset="100%" stop-color="#8E2F1E"/></radialGradient>'
 +'<radialGradient id="salamiG" cx="40%" cy="35%" r="70%"><stop offset="0%" stop-color="#CE5240"/><stop offset="75%" stop-color="#A83527"/><stop offset="100%" stop-color="#8C281C"/></radialGradient>'
 +'<linearGradient id="leafG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7BA05B"/><stop offset="100%" stop-color="#48642F"/></linearGradient>'
 +'<linearGradient id="hamG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#EFA795"/><stop offset="100%" stop-color="#D3796A"/></linearGradient>'
 +'<linearGradient id="pineG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F7D965"/><stop offset="100%" stop-color="#E4B33B"/></linearGradient>'
 +'<filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="7" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="6"/></filter>'
 +'<filter id="rough2"><feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="2" seed="4" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="4"/></filter>'
 +'<filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="3" result="n"/><feColorMatrix in="n" type="matrix" values="0 0 0 0 0.55  0 0 0 0 0.38  0 0 0 0 0.13  0 0 0 0.5 0" result="c"/><feComposite in="c" in2="SourceGraphic" operator="in"/></filter>'
 +'<filter id="grainD"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="9" result="n"/><feColorMatrix in="n" type="matrix" values="0 0 0 0 0.25  0 0 0 0 0.14  0 0 0 0 0.05  0 0 0 0.55 0" result="c"/><feComposite in="c" in2="SourceGraphic" operator="in"/></filter>'
 +'<filter id="blur1"><feGaussianBlur stdDeviation="1.2"/></filter>'
 +'<filter id="blur2"><feGaussianBlur stdDeviation="2.5"/></filter>'
 +'<filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>'
 +'</defs>';

function svg(inner){ return '<svg viewBox="0 0 200 200">'+DEFS+inner+'</svg>'; }

/* Ciemny talerz ceramiczny (jak w fotografii kulinarnej) */
function darkPlate(){
  return '<ellipse cx="100" cy="112" rx="88" ry="16" fill="#000" opacity=".18" filter="url(#blur4)"/>'
   +'<circle cx="100" cy="100" r="90" fill="url(#plate)"/>'
   +'<circle cx="100" cy="100" r="90" fill="none" stroke="#000" stroke-width="1" opacity=".35"/>'
   +'<circle cx="100" cy="100" r="84" fill="none" stroke="#5A4C3E" stroke-width="1.2" opacity=".5"/>'
   +'<path d="M34 66 A74 74 0 0 1 78 26" stroke="#8A7A66" stroke-width="3" fill="none" opacity=".35" filter="url(#blur2)"/>';
}

/* Baza pizzy z organiczną krawędzią, przypieczeniami i teksturą sera */
function pizzaBase(toppings){
  var charSpots='';
  var CH=[[52,52],[148,60],[160,118],[120,162],[58,150],[38,104],[96,34],[164,86]];
  for(var i=0;i<CH.length;i++){ charSpots+='<ellipse cx="'+CH[i][0]+'" cy="'+CH[i][1]+'" rx="7" ry="4.5" fill="#7A4A18" opacity=".5" filter="url(#blur1)" transform="rotate('+(i*47)+' '+CH[i][0]+' '+CH[i][1]+')"/>'; }
  var bake='';
  var BK=[[80,72],[124,86],[70,116],[104,132],[132,120],[92,96],[116,62],[60,92]];
  for(var j=0;j<BK.length;j++){ bake+='<ellipse cx="'+BK[j][0]+'" cy="'+BK[j][1]+'" rx="'+(5+(j%3)*2)+'" ry="'+(3.5+(j%2)*2)+'" fill="#D08E3A" opacity=".55" filter="url(#blur1)" transform="rotate('+(j*33)+' '+BK[j][0]+' '+BK[j][1]+')"/>'; }
  return darkPlate()
   +'<g filter="url(#rough)"><circle cx="100" cy="100" r="72" fill="url(#crustG)"/></g>'
   +'<g filter="url(#rough)"><circle cx="100" cy="100" r="72" fill="none" stroke="#9A6A28" stroke-width="2" opacity=".5"/></g>'
   + charSpots
   +'<g filter="url(#rough2)"><circle cx="100" cy="100" r="60" fill="url(#sauceG)"/></g>'
   +'<g filter="url(#rough2)"><circle cx="100" cy="100" r="56" fill="url(#cheeseG)"/></g>'
   +'<circle cx="100" cy="100" r="56" filter="url(#grain)" opacity=".5"/>'
   + bake
   + toppings
   +'<path d="M52 62 A62 62 0 0 1 96 40" stroke="#FFF6DF" stroke-width="5" fill="none" opacity=".28" filter="url(#blur2)"/>';
}

function leaf(x,y,r,s){
  s=s||1;
  return '<g transform="translate('+x+' '+y+') rotate('+r+') scale('+s+')">'
   +'<ellipse cx="0" cy="0" rx="7.5" ry="4" fill="url(#leafG)"/>'
   +'<path d="M-6 0 Q0 -1 6 0" stroke="#DFF0C8" stroke-width=".8" fill="none" opacity=".8"/>'
   +'<ellipse cx="0" cy="1.5" rx="7.5" ry="2" fill="#000" opacity=".12" filter="url(#blur1)"/></g>';
}
function mozz(x,y,s){
  s=s||1;
  return '<g transform="translate('+x+' '+y+') scale('+s+')">'
   +'<ellipse cx="0" cy="0" rx="9" ry="8" fill="#FDF6E3"/>'
   +'<ellipse cx="-2" cy="-2" rx="4" ry="3" fill="#FFFDF6" opacity=".9"/>'
   +'<ellipse cx="0" cy="6" rx="8" ry="2" fill="#C79A4B" opacity=".25" filter="url(#blur1)"/></g>';
}
function salami(x,y){
  var fat='';
  var F=[[-3,-2,2],[3,1,1.6],[-1,3,1.3],[2,-4,1.2]];
  for(var i=0;i<F.length;i++){ fat+='<ellipse cx="'+F[i][0]+'" cy="'+F[i][1]+'" rx="'+F[i][2]+'" ry="'+(F[i][2]*.8)+'" fill="#ECAFA0" opacity=".95"/>'; }
  return '<g transform="translate('+x+' '+y+')">'
   +'<circle cx="0" cy="1.5" r="10" fill="#000" opacity=".2" filter="url(#blur1)"/>'
   +'<circle cx="0" cy="0" r="10" fill="url(#salamiG)"/>'
   +'<circle cx="0" cy="0" r="10" fill="none" stroke="#6E1E14" stroke-width="1.4" opacity=".8"/>'
   + fat
   +'<ellipse cx="-3" cy="-4" rx="4" ry="2" fill="#fff" opacity=".22"/></g>';
}
function mush(x,y,r){
  return '<g transform="translate('+x+' '+y+') rotate('+(r||0)+')">'
   +'<ellipse cx="0" cy="2" rx="9" ry="3" fill="#000" opacity=".15" filter="url(#blur1)"/>'
   +'<path d="M-8 2 Q-8 -7 0 -7 Q8 -7 8 2 Z" fill="#EFE4D2"/>'
   +'<path d="M-8 2 Q-8 -7 0 -7 Q8 -7 8 2 Z" fill="none" stroke="#B9A281" stroke-width="1"/>'
   +'<path d="M-5 2 L-5 -4 M0 2 L0 -5.5 M5 2 L5 -4" stroke="#C4AD88" stroke-width=".8" opacity=".7"/>'

var active='all';
var cart={};       /* id -> {n,p,qty} */
var sheet=null;    /* {item, qty, addons:{}} */

function zl(v){return v.toFixed(2).replace('.',',')+' zł';}
function count(){var s=0;for(var k in cart)s+=cart[k].qty;return s;}
function total(){var s=0;for(var k in cart)s+=cart[k].p*cart[k].qty;return s;}
function inCartQty(prodId){
  var s=0;
  for(var k in cart){ if(k===prodId||k.indexOf(prodId+'|')===0) s+=cart[k].qty; }
  return s;
}

function renderCats(){
  var h='';
  for(var i=0;i<CATS.length;i++){
    var c=CATS[i];
    h+='<button class="cat '+(c.id===active?'on':'')+'" onclick="setCat(\''+c.id+'\')">'+icon(c.icon)+'<span>'+c.name+'</span></button>';
  }
  document.getElementById('cats').innerHTML=h;
}
function setCat(id){active=id;document.getElementById('q').value='';render();}

function render(){
  renderCats();
  var q=document.getElementById('q').value.trim().toLowerCase();
  var list=[];
  for(var i=0;i<MENU.length;i++){
    var m=MENU[i];
    if(q){ if(m.n.toLowerCase().indexOf(q)>=0) list.push(m); }
    else if(active==='all'||m.cat===active) list.push(m);
  }
  document.getElementById('secTitle').textContent = q?'Wyniki wyszukiwania':(active==='all'?'Popularne teraz':CATS.filter(function(c){return c.id===active;})[0].name);
  document.getElementById('secCount').textContent = list.length+' pozycji';
  var h='';
  for(var j=0;j<list.length;j++){
    var m2=list[j];
    var qty=inCartQty(m2.id);
    h+='<div class="card" onclick="openProd(\''+m2.id+'\')">'
      +'<span class="incart '+(qty>0?'show':'')+'">W koszyku ×'+qty+'</span>'
      +'<div class="ph">'+ART[m2.art]+'</div>'
      +'<div class="body"><div class="nm">'+m2.n+'</div><div class="ds">'+(m2.d||'&nbsp;')+'</div>'
      +'<div class="row"><span class="pr">'+zl(m2.p)+'</span><span class="view">Wybierz</span></div>'
      +'</div></div>';
  }
  document.getElementById('grid').innerHTML=h;
  document.getElementById('empty').classList.toggle('hide', list.length>0);
  syncNav(false);
}

/* ---- Karta produktu (świadome dodawanie) ---- */
function openProd(id){
  var item=MENU.filter(function(m){return m.id===id;})[0];
  sheet={item:item, qty:1, addons:{}};
  document.getElementById('prodArt').innerHTML=ART[item.art];
  document.getElementById('prodName').textContent=item.n;
  document.getElementById('prodDesc').textContent=item.d||'';
  renderAddons(); syncSheet();
  document.getElementById('prodOverlay').classList.add('show');
}
function closeProd(){ document.getElementById('prodOverlay').classList.remove('show'); sheet=null; }
function renderAddons(){
  var w=document.getElementById('prodAddons');
  if(!sheet.item.addons){ w.innerHTML=''; return; }
  var h='<div class="lbl">DODATKI</div>';
  for(var i=0;i<sheet.item.addons.length;i++){
    var a=sheet.item.addons[i];
    var on=!!sheet.addons[a.id];
    h+='<div class="addon '+(on?'on':'')+'" onclick="toggleAddon(\''+a.id+'\')">'
      +'<span class="tickbox">'+(on?'✓':'')+'</span>'
      +'<span class="an">'+a.n+'</span><span class="ap">+'+zl(a.p)+'</span></div>';
  }
  w.innerHTML=h;
}
function toggleAddon(id){ sheet.addons[id]=!sheet.addons[id]; renderAddons(); syncSheet(); }
function chSheetQty(d){ sheet.qty=Math.max(1,sheet.qty+d); syncSheet(); }
function sheetUnit(){
  var u=sheet.item.p;
  if(sheet.item.addons){ for(var i=0;i<sheet.item.addons.length;i++){ var a=sheet.item.addons[i]; if(sheet.addons[a.id]) u+=a.p; } }
  return u;
}
function syncSheet(){
  document.getElementById('sheetQty').textContent=sheet.qty;
  document.getElementById('sheetTotal').textContent=zl(sheetUnit()*sheet.qty);
}
function confirmAdd(){
  var names=[]; var key=sheet.item.id; var unit=sheet.item.p;
  if(sheet.item.addons){
    for(var i=0;i<sheet.item.addons.length;i++){ var a=sheet.item.addons[i]; if(sheet.addons[a.id]){ names.push(a.n); unit+=a.p; key+='|'+a.id; } }
  }
  var label=sheet.item.n+(names.length?' ('+names.join(', ')+')':'');
  if(!cart[key]) cart[key]={n:label,p:unit,qty:0};
  cart[key].qty+=sheet.qty;
  var msg='Dodano: '+sheet.item.n+' ×'+sheet.qty;
  closeProd();
  render();
  syncNav(true);
  showToast(msg);
}

/* ---- Widoczne potwierdzenie ---- */
var toastT=null;
function showToast(msg){
  var t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show');
  var b=document.getElementById('badge');
  b.classList.remove('pop'); void b.offsetWidth; b.classList.add('pop');
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(function(){t.classList.remove('show');},2400);
}

function syncNav(pulse){
  var c=count();
  var b=document.getElementById('badge'); b.textContent=c; b.classList.toggle('show',c>0);
  document.getElementById('navIdle').classList.toggle('hide',c>0);
  var nf=document.getElementById('navFull');
  nf.classList.toggle('hide',c===0);
  document.getElementById('navCnt').textContent=c;
  document.getElementById('navSum').textContent=zl(total());
  if(pulse){ nf.classList.remove('pulse'); void nf.offsetWidth; nf.classList.add('pulse'); }
}

/* ---- Koszyk ---- */
function openCart(){ renderCart(); document.getElementById('cartOverlay').classList.add('show'); }
function closeCart(){ document.getElementById('cartOverlay').classList.remove('show'); }
function chQty(key,d){
  if(!cart[key])return;
  cart[key].qty+=d;
  if(cart[key].qty<=0)delete cart[key];
  render(); renderCart(); syncNav(false);
}
function renderCart(){
  var w=document.getElementById('cartLines');
  var h=''; var any=false;
  for(var k in cart){
    any=true; var l=cart[k];
    h+='<div class="line"><div><div class="nm2">'+l.n+'</div><div class="pr2">'+zl(l.p)+'</div></div>'
      +'<div class="qty"><button class="qb" onclick="chQty(\''+k+'\',-1)">−</button><b>'+l.qty+'</b><button class="qb" onclick="chQty(\''+k+'\',1)">+</button></div></div>';
  }
  w.innerHTML = any?h:'<div class="empty">Koszyk jest pusty</div>';
  document.getElementById('cartTotal').textContent=zl(total());
