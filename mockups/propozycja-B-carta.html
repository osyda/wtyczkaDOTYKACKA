var cartSum=0;
var f=MENU[0];
document.getElementById('fImg').src=PH[f.id];
document.getElementById('fName').textContent=f.n;
document.getElementById('fDesc').textContent=f.d;
document.getElementById('fPrice').textContent=f.p+' zł';
var list=document.getElementById('list');
MENU.slice(1).forEach(function(m,i){
  var r=document.createElement('div');
  r.className='row reveal'; r.style.animationDelay=(0.22+i*0.06)+'s';
  r.onclick=function(){ add(i+1); };
  r.innerHTML='<img src="'+PH[m.id]+'" alt=""><div class="rmain"><div class="rtop">'

    +'</div><div class="rdesc">'+m.d+'</div></div>';
  list.appendChild(r);
});
function add(i){
  cartSum+=parseFloat(MENU[i].p.replace(',','.'));
  document.getElementById('cart').textContent=cartSum.toFixed(2).replace('.',',')+' zł';
}
</script>
