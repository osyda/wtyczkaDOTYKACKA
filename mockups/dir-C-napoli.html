<!DOCTYPE html>
<html lang="pl"><head><meta charset="utf-8"><title>Kierunek C — Napoli</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;}
  .cond{font-family:"Arial Narrow","Helvetica Neue",Impact,sans-serif;}
  body{width:430px;height:920px;background:#FBF3E3;color:#1A1A1A;overflow:hidden;}
  .tag{position:absolute;top:12px;left:12px;z-index:5;background:#E63027;color:#fff;font-weight:800;font-size:11px;letter-spacing:.5px;padding:5px 11px;border-radius:4px;}
  .stripe{height:8px;background:repeating-linear-gradient(45deg,#E63027 0 14px,#1A8A7A 14px 28px);}
  .hero{padding:46px 20px 18px;background:#FBF3E3;}
  .hrow{display:flex;align-items:center;justify-content:space-between;}
  .mark{display:flex;align-items:center;gap:11px;}
  .ring{width:48px;height:48px;border-radius:8px;background:#E63027;display:flex;align-items:center;justify-content:center;font-size:24px;}
  .name{font-size:32px;font-weight:800;text-transform:uppercase;letter-spacing:1px;line-height:.95;}
  .sub{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#1A8A7A;margin-top:3px;}
  .chips{display:flex;gap:8px;margin-top:16px;}
  .chip{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;border:2px solid #1A1A1A;padding:6px 11px;border-radius:6px;}
  .sec{padding:14px 20px 8px;}
  .sec h2{font-size:30px;font-weight:800;text-transform:uppercase;letter-spacing:1px;}
  .sec h2 .red{color:#E63027;}
  .grid{padding:0 20px;display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  .card{background:#fff;border:2.5px solid #1A1A1A;border-radius:14px;overflow:hidden;box-shadow:5px 5px 0 #1A1A1A;}
  .ph{height:104px;display:flex;align-items:center;justify-content:center;font-size:52px;background:#FFE7D6;border-bottom:2.5px solid #1A1A1A;position:relative;}
  .pricetag{position:absolute;left:8px;bottom:8px;background:#E63027;color:#fff;font-weight:800;font-size:14px;padding:3px 9px;border-radius:6px;}
  .add{position:absolute;right:8px;bottom:8px;width:34px;height:34px;border-radius:8px;background:#1A8A7A;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;}
  .b{padding:11px 12px 13px;}
  .b h3{font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;}
  .b p{font-size:11px;color:#7a7268;margin-top:3px;line-height:1.35;}
  .bar{position:absolute;left:16px;right:16px;bottom:16px;background:#1A1A1A;color:#fff;border-radius:12px;padding:15px 18px;display:flex;align-items:center;justify-content:space-between;}
  .bar b{font-size:17px;}.bar .go{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#FBF3E3;background:#E63027;padding:8px 14px;border-radius:8px;}
  .cc{width:26px;height:26px;border-radius:6px;background:#E63027;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:13px;}
</style></head><body>
  <div class="tag">KIERUNEK C · NAPOLI</div>
  <div class="stripe"></div>
  <div class="hero">
    <div class="hrow"><div class="mark"><div class="ring">🍕</div><div><div class="name cond">Mamma<br>Rosa</div><div class="sub">Pizzeria Napoletana</div></div></div></div>
    <div class="chips"><span class="chip">⏱ ~35 min</span><span class="chip">Dostawa 5 zł</span><span class="chip">★ 4,9</span></div>
  </div>
  <div class="sec"><h2 class="cond">Nasza <span class="red">Pizza</span></h2></div>
  <div class="grid">
    <div class="card"><div class="ph">🍕<span class="pricetag">34 zł</span><div class="add">+</div></div><div class="b"><h3>Capricciosa</h3><p>Szynka, pieczarki, karczochy</p></div></div>
    <div class="card"><div class="ph">🍕<span class="pricetag">26 zł</span><div class="add">+</div></div><div class="b"><h3>Margherita</h3><p>Pomidor, mozzarella, bazylia</p></div></div>
    <div class="card"><div class="ph">🍕<span class="pricetag">34 zł</span><div class="add">+</div></div><div class="b"><h3>Diavola</h3><p>Salami pikantne, papryczki</p></div></div>
    <div class="card"><div class="ph">🥤<span class="pricetag">7 zł</span><div class="add">+</div></div><div class="b"><h3>Coca-Cola</h3><p>0,5 l</p></div></div>
  </div>
  <div class="bar"><span style="display:flex;align-items:center;gap:11px;"><span class="cc">3</span><b>86,00 zł</b></span><span class="go">Koszyk →</span></div>
</body></html>
